<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>廖洁专属 · 洛克王国爱意助手</title>
    <!-- 依赖库 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;700;900&display=swap');
        body { 
            background: linear-gradient(135deg, #fff5f7 0%, #f3e8ff 100%); 
            font-family: 'Noto Sans SC', sans-serif;
            overflow-x: hidden;
            min-height: 100vh;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 20px 40px -10px rgba(244, 114, 182, 0.1);
        }
        .floating { animation: floating 3s ease-in-out infinite; }
        @keyframes floating {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }
        .love-burst { animation: burst 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes burst {
            0% { transform: scale(0.8); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
        @keyframes blob {
            0% { transform: translate(0px, 0px) scale(1); }
            33% { transform: translate(30px, -50px) scale(1.1); }
            66% { transform: translate(-20px, 20px) scale(0.9); }
            100% { transform: translate(0px, 0px) scale(1); }
        }
        .animate-blob { animation: blob 7s infinite; }
        .animation-delay-2000 { animation-delay: 2s; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect, useRef } = React;

        // === 数据源 ===
        const RULES_URL = "https://raw.githubusercontent.com/hongzfeng/roco-data/refs/heads/main/official_type_rules.json"; 
        const PETS_URL = "https://raw.githubusercontent.com/hongzfeng/roco-data/refs/heads/main/roco_pets_cards.json";

        const TYPE_COLORS = {
            '普通': 'bg-stone-300', '火': 'bg-rose-400', '水': 'bg-sky-400', '草': 'bg-emerald-400',
            '电': 'bg-amber-300', '冰': 'bg-blue-200', '武': 'bg-orange-500', '毒': 'bg-fuchsia-400',
            '地': 'bg-yellow-600', '翼': 'bg-indigo-300', '虫': 'bg-lime-400', '石': 'bg-gray-500',
            '幽': 'bg-violet-500', '龙': 'bg-purple-600', '恶': 'bg-slate-700', '机械': 'bg-zinc-400',
            '萌': 'bg-pink-400', '光': 'bg-yellow-100 text-yellow-800', '幻': 'bg-pink-500'
        };

        const LOVE_QUOTES = [
            "廖洁，今天的你比光系精灵还要闪耀 ✨",
            "遇见你是我在洛克王国抓到的最稀有的‘精灵’ ❤️",
            "不管属性如何克制，我对你的爱永远是3倍伤害！",
            "廖洁，你是我的专属守护神 👼",
            "和你在一起的每一秒，都是我的极致克制时刻。",
            "廖洁，你是我的全系守护，无人能及 🌸"
        ];

        // === 修复 NotFoundError 的图标组件 ===
        const LucideIcon = ({ name, size = 20, className = "", fill = "none" }) => {
            const containerRef = useRef(null);

            useEffect(() => {
                if (window.lucide && containerRef.current) {
                    // 使用 innerHTML 隔离 React 的 DOM 管理，防止 removeChild 错误
                    containerRef.current.innerHTML = `<i data-lucide="${name}" class="${className}" style="width: ${size}px; height: ${size}px; fill: ${fill}"></i>`;
                    window.lucide.createIcons({
                        root: containerRef.current
                    });
                }
            }, [name, size, className, fill]);

            return <span ref={containerRef} className="inline-flex items-center justify-center"></span>;
        };

        function App() {
            const [data, setData] = useState({ rules: null, pets: [] });
            const [loading, setLoading] = useState(true);
            const [error, setError] = useState(null);
            const [defenders, setDefenders] = useState([]);
            const [quote, setQuote] = useState(LOVE_QUOTES[0]);
            const [showBurst, setShowBurst] = useState(false);

            useEffect(() => {
                async function init() {
                    try {
                        const [rRes, pRes] = await Promise.all([fetch(RULES_URL), fetch(PETS_URL)]);
                        if (!rRes.ok || !pRes.ok) throw new Error("同步远程数据失败");
                        
                        const rules = await rRes.json();
                        const rawPets = await pRes.json();
                        
                        const WIKI_MAP = { '幽灵': '幽', '恶魔': '恶', '土': '地' };
                        const processedPets = rawPets.map(p => {
                            const clean = new Set();
                            if (Array.isArray(p.types)) {
                                p.types.forEach(tg => {
                                    if (typeof tg === 'string') {
                                        tg.split(',').forEach(t => {
                                            let s = t.trim(); s = WIKI_MAP[s] || s;
                                            if (rules[s]) clean.add(s);
                                        });
                                    }
                                });
                            }
                            return { name: p.name, types: Array.from(clean) };
                        });
                        
                        setData({ rules, pets: processedPets });
                        setLoading(false);
                    } catch (e) { 
                        setError(e.message);
                        setLoading(false);
                    }
                }
                init();
            }, []);

            const results = useMemo(() => {
                if (!data.rules || defenders.length === 0) return null;
                const res = { '3': [], '2': [], '1': [], '0.5': [], '0.25': [], '0': [] };
                Object.keys(data.rules).forEach(attacker => {
                    let m = 1;
                    defenders.forEach(def => {
                        if (data.rules[attacker].strong.includes(def)) m *= 2;
                        if (data.rules[attacker].resist.includes(def)) m *= 0.5;
                    });
                    if (m >= 4) m = 3;
                    const key = m.toString();
                    if (res[key]) res[key].push(attacker);
                    else if (m < 0.25 && m > 0) res['0.25'].push(attacker);
                    else if (m === 0) res['0'].push(attacker);
                });
                return res;
            }, [defenders, data.rules]);

            const getRecommendedPets = (type) => {
                const matches = [];
                const seen = new Set();
                for (let i = data.pets.length - 1; i >= 0; i--) {
                    const p = data.pets[i];
                    if (p.types.includes(type) && !seen.has(p.name)) {
                        matches.push(p.name);
                        seen.add(p.name);
                    }
                    if (matches.length >= 6) break;
                }
                return matches;
            };

            const getDefenderSpriteReference = useMemo(() => {
                if (defenders.length === 0) return [];
                const matches = [];
                const seen = new Set();
                for (let i = data.pets.length - 1; i >= 0; i--) {
                    const p = data.pets[i];
                    if (defenders.every(t => p.types.includes(t)) && !seen.has(p.name)) {
                        matches.push(p.name);
                        seen.add(p.name);
                    }
                    if (matches.length >= 15) break;
                }
                return matches;
            }, [defenders, data.pets]);

            const triggerLove = () => {
                setQuote(LOVE_QUOTES[Math.floor(Math.random() * LOVE_QUOTES.length)]);
                setShowBurst(true);
                setTimeout(() => setShowBurst(false), 1000);
            };

            if (loading) return (
                <div className="h-screen flex flex-col items-center justify-center bg-pink-50/30">
                    <div className="relative">
                        <div className="w-20 h-20 border-4 border-pink-100 border-t-pink-500 rounded-full animate-spin"></div>
                        <div className="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 text-pink-500">
                             <LucideIcon name="heart" size={32} fill="currentColor" className="animate-pulse" />
                        </div>
                    </div>
                    <p className="mt-6 font-bold text-pink-400 tracking-widest animate-bounce">正在为 廖洁 收集全王国的数据...</p>
                </div>
            );

            if (error) return (
                <div className="h-screen flex items-center justify-center bg-slate-50">
                    <div className="glass-card p-8 rounded-3xl text-center shadow-xl">
                        <LucideIcon name="alert-circle" size={48} className="text-rose-500 mb-4" />
                        <p className="text-rose-500 font-bold mb-4 text-lg">加载失败: {error}</p>
                        <button onClick={() => window.location.reload()} className="px-8 py-3 bg-pink-500 text-white rounded-full font-bold shadow-lg shadow-pink-200">刷新重试</button>
                    </div>
                </div>
            );

            return (
                <div className="max-w-6xl mx-auto p-4 md:p-8 relative min-h-screen">
                    {/* 背景流动装饰 */}
                    <div className="fixed top-20 -left-20 w-64 h-64 bg-pink-200 rounded-full mix-blend-multiply filter blur-3xl opacity-30 animate-blob"></div>
                    <div className="fixed bottom-20 -right-20 w-64 h-64 bg-purple-200 rounded-full mix-blend-multiply filter blur-3xl opacity-30 animate-blob animation-delay-2000"></div>

                    <header className="flex flex-col md:flex-row items-center justify-between mb-12 gap-6 relative z-10">
                        <div className="flex items-center gap-5">
                            <div className="bg-pink-500 p-4 rounded-[2rem] shadow-lg shadow-pink-200 floating">
                                <LucideIcon name="sparkles" size={32} className="text-white" />
                            </div>
                            <div>
                                <h1 className="text-4xl font-black text-slate-800">廖洁专属 <span className="text-pink-500">·</span> 爱意助手</h1>
                                <p className="text-pink-400 font-bold text-xs mt-1 uppercase tracking-[0.2em] flex items-center gap-2">
                                    <LucideIcon name="heart" size={12} fill="currentColor" /> 爱你永远不变
                                </p>
                            </div>
                        </div>
                        <button onClick={triggerLove} className="bg-white/80 backdrop-blur px-6 py-3 rounded-2xl shadow-sm border border-pink-100 flex items-center gap-3 group transition-all hover:shadow-pink-100 hover:scale-105 active:scale-95">
                            <div className="text-right">
                                <p className="text-[10px] font-black text-slate-300 uppercase">点击获取惊喜</p>
                                <p className="text-xs font-bold text-pink-500">廖洁的专属守护星</p>
                            </div>
                            <div className="w-10 h-10 rounded-full bg-pink-50 flex items-center justify-center text-pink-500 group-hover:bg-pink-500 group-hover:text-white transition-colors">
                                <LucideIcon name="heart" size={20} fill={showBurst ? "currentColor" : "none"} className={showBurst ? "love-burst" : ""} />
                            </div>
                        </button>
                    </header>

                    <div className="mb-10 text-center animate-in fade-in slide-in-from-top-4 duration-700">
                        <p className="inline-block px-8 py-3 bg-white/70 backdrop-blur border border-pink-200 rounded-full text-pink-600 font-bold text-sm italic shadow-sm">
                            " {quote} "
                        </p>
                    </div>

                    <main className="grid grid-cols-1 lg:grid-cols-12 gap-8 relative z-10">
                        {/* 左侧：输入控制 */}
                        <div className="lg:col-span-5 space-y-6">
                            <section className="glass-card p-8 rounded-[3rem] shadow-xl">
                                <h2 className="text-xl font-black text-slate-800 mb-6 flex items-center gap-3">
                                    <LucideIcon name="shield" className="text-pink-500" /> 设定对方属性
                                </h2>
                                <div className="grid grid-cols-4 sm:grid-cols-5 lg:grid-cols-4 gap-3">
                                    {Object.keys(data.rules).map(type => (
                                        <button 
                                            key={type}
                                            onClick={() => defenders.includes(type) ? setDefenders(defenders.filter(t => t!==type)) : defenders.length<2 && setDefenders([...defenders, type])}
                                            className={`py-3 rounded-2xl font-black text-xs transition-all border ${
                                                defenders.includes(type) 
                                                ? `${TYPE_COLORS[type]} text-white border-transparent ring-4 ring-pink-100 shadow-lg scale-95` 
                                                : 'bg-white/50 text-slate-500 border-slate-100 hover:border-pink-200 hover:text-pink-500'
                                            }`}
                                        >
                                            {type}
                                        </button>
                                    ))}
                                </div>
                                
                                <div className="mt-8 p-6 bg-pink-50/50 rounded-3xl border border-pink-100">
                                    <h3 className="text-xs font-black text-pink-400 mb-4 uppercase tracking-widest flex items-center gap-2">
                                        <LucideIcon name="search" size={14} /> 可能遇到的对手
                                    </h3>
                                    <div className="flex flex-wrap gap-2">
                                        {defenders.length === 0 ? (
                                            <p className="text-slate-400 text-xs italic py-2">等待选定属性...</p>
                                        ) : getDefenderSpriteReference.length > 0 ? (
                                            getDefenderSpriteReference.map(name => (
                                                <span key={name} className="px-3 py-1.5 bg-white text-slate-700 text-[11px] font-bold rounded-xl border border-pink-50 shadow-sm hover:bg-pink-500 hover:text-white transition-colors cursor-default">
                                                    {name}
                                                </span>
                                            ))
                                        ) : (
                                            <p className="text-rose-400 text-xs font-bold py-2">图鉴暂未录入该组合</p>
                                        )}
                                    </div>
                                </div>
                            </section>
                        </div>

                        {/* 右侧：结果展示 */}
                        <div className="lg:col-span-7">
                            <div className="bg-white/90 rounded-[3rem] shadow-2xl shadow-pink-100/50 overflow-hidden flex flex-col min-h-[600px] border border-pink-50">
                                <div className="bg-slate-900 p-8 flex items-center justify-between">
                                    <div className="flex items-center gap-4 text-white">
                                        <div className="w-12 h-12 rounded-2xl bg-pink-500/20 flex items-center justify-center text-pink-500">
                                            <LucideIcon name="swords" size={24} />
                                        </div>
                                        <h3 className="font-black text-xl tracking-tight">爱意战斗方案</h3>
                                    </div>
                                    <button onClick={() => { setDefenders([]); triggerLove(); }} className="text-pink-400 hover:text-white transition-colors">
                                        <LucideIcon name="refresh-cw" size={18} />
                                    </button>
                                </div>

                                <div className="p-8 grow">
                                    {!results ? (
                                        <div className="h-full flex flex-col items-center justify-center space-y-6 opacity-40 py-20">
                                            <LucideIcon name="heart" size={64} className="text-pink-200 animate-pulse" fill="currentColor" />
                                            <p className="font-bold text-slate-400">廖洁，请选择属性开始爱的计算</p>
                                        </div>
                                    ) : (
                                        <div className="space-y-8 animate-in fade-in duration-500">
                                            {/* 克制区 */}
                                            {['3', '2'].map(val => results[val].length > 0 && (
                                                <div key={val} className={`p-6 rounded-[2.5rem] border-2 ${val === '3' ? 'bg-pink-50/50 border-pink-100 shadow-pink-50' : 'bg-orange-50/50 border-orange-100 shadow-orange-50'} shadow-xl`}>
                                                    <h3 className={`font-black text-lg mb-6 flex items-center gap-2 ${val === '3' ? 'text-pink-600' : 'text-orange-600'}`}>
                                                        <LucideIcon name="zap" size={18} fill="currentColor" /> 
                                                        {val === '3' ? '对廖洁的极致宠爱' : '推荐打击属性'} ({val}x)
                                                    </h3>
                                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                                        {results[val].map(t => (
                                                            <div key={t} className="bg-white p-4 rounded-2xl shadow-sm border border-slate-50 hover:shadow-md transition-shadow group">
                                                                <div className="flex items-center justify-between mb-3">
                                                                    <span className={`px-4 py-1.5 rounded-xl text-white font-black text-xs shadow-md ${TYPE_COLORS[t]}`}>{t}</span>
                                                                    <LucideIcon name="sparkles" className="text-slate-200 group-hover:text-yellow-400 transition-colors" size={14} />
                                                                </div>
                                                                <div className="flex flex-wrap gap-1.5">
                                                                    {getRecommendedPets(t).map(name => (
                                                                        <span key={name} className="px-2.5 py-1 bg-pink-50/30 text-slate-600 text-[10px] font-bold rounded-lg border border-pink-100">{name}</span>
                                                                    ))}
                                                                </div>
                                                            </div>
                                                        ))}
                                                    </div>
                                                </div>
                                            ))}
                                            
                                            {/* 正常/抵抗倍率 */}
                                            <div className="grid grid-cols-2 gap-4">
                                                <div className="p-5 bg-slate-50 rounded-[2rem] border border-slate-100">
                                                    <h4 className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-4 flex items-center gap-2">
                                                        <LucideIcon name="activity" size={12} /> 1.0x 正常
                                                    </h4>
                                                    <div className="flex flex-wrap gap-1.5">
                                                        {results['1'].map(t => <span key={t} className="px-3 py-1 bg-white text-slate-600 text-[10px] font-bold rounded-lg border border-slate-100">{t}</span>)}
                                                    </div>
                                                </div>
                                                <div className="p-5 bg-slate-100/50 rounded-[2rem] border border-slate-200/50">
                                                    <h4 className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-4 flex items-center gap-2">
                                                        <LucideIcon name="shield-alert" size={12} /> 弱效/抵抗
                                                    </h4>
                                                    <div className="flex flex-wrap gap-1.5">
                                                        {results['0.5'].concat(results['0.25']).concat(results['0']).map(t => <span key={t} className="px-3 py-1 bg-slate-200 text-slate-400 text-[10px] font-bold rounded-lg">{t}</span>)}
                                                    </div>
                                                </div>
                                            </div>

                                            {/* 浪漫彩蛋 */}
                                            {defenders.some(d => d === '光' || d === '幻') && (
                                                <div className="p-5 bg-gradient-to-r from-pink-500 to-rose-400 rounded-3xl text-white text-center shadow-lg animate-bounce border-2 border-white/50">
                                                    <p className="font-black text-sm tracking-widest">✨ 廖洁发现彩蛋了！你是光，也是最美的幻想 ✨</p>
                                                </div>
                                            )}
                                        </div>
                                    )}
                                </div>

                                <footer className="p-8 border-t border-pink-50 text-center bg-white/50">
                                    <p className="text-[10px] font-black text-pink-300 uppercase tracking-[0.4em]">Designed with ❤️ for Liao Jie</p>
                                </footer>
                            </div>
                        </div>
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
