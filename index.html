                if (!TYPE_RULES_DATA[atk]) return 1;
                if (TYPE_RULES_DATA[atk].strong.includes(def)) return 2;
                if (TYPE_RULES_DATA[atk].resist.includes(def)) return 0.5;

                const WIKI_MAP = { '幽灵': '幽', '恶魔': '恶', '土': '地' };
                return PET_DATA.map(p => {
                    const clean = new Set();
                    p.types.forEach(tg => {
                        const items = typeof tg === 'string' ? tg.split(',') : [tg];
                        items.forEach(t => {
                            let s = t.trim(); 
                            s = WIKI_MAP[s] || s;
                            if (TYPE_RULES_DATA[s]) clean.add(s);
                        });
                    });
                    return { name: p.name, types: Array.from(clean) };
                });
            }, []);

            const getMatchingPets = (types) => {
                if (types.length === 0) return [];

                    let dangerCount = 0;

                        });

                            return m > 1;
                        });
                        if (getsHit) dangerCount++;
                    });

                    return { ...myPet, targets, danger: dangerCount };
                });

                };

                                                {slot.types.length > 0 ? slot.types.map(t => (
                                                    <div key={t} className={`w-5 h-5 rounded-full ${TYPE_COLORS[t]} flex items-center justify-center text-[7px] text-white font-bold shadow-sm`}>{t[0]}</div>
                                                )) : <LucideIcon name="plus" size={14} className="text-slate-200" />}
                                            </div>
                                            <p className={`text-[10px] font-black text-center leading-tight ${slot.confirmedName ? 'text-pink-600' : (slot.types.length > 0 ? 'text-slate-500' : 'text-slate-300 italic')}`}>
                                                {slot.confirmedName ? (
                                                    <span className="flex flex-col items-center gap-1"><LucideIcon name="shield-check" size={10} />{slot.confirmedName}</span>
                                                ) : (slot.types.length > 0 ? '确认身份' : '待录入')}
                                            </p>
                                        </button>
                                    ))}
                                </div>

                                <div className="p-8 bg-pink-50/50 rounded-[2.8rem] border-2 border-pink-100 relative">
                                    <div className="absolute -top-3 left-8 px-4 bg-pink-500 text-white text-[9px] font-black rounded-full py-1 uppercase tracking-widest">Type Input</div>
                                    <h3 className="text-[11px] font-black text-slate-400 mb-6 text-center mt-2">配置精灵 {activeSlot + 1} 的属性</h3>
                                    <div className="grid grid-cols-4 gap-2 mb-8">
                                        {Object.keys(TYPE_RULES_DATA).map(type => (
                                            <button key={type} onClick={() => toggleType(type)} className={`py-2.5 rounded-xl font-black text-[11px] transition-all border ${opponentTeam[activeSlot].types.includes(type) ? `${TYPE_COLORS[type]} text-white border-transparent shadow-md scale-95` : 'bg-white text-slate-400 border-slate-100 hover:border-pink-200'}`}>{type}</button>
                                        ))}
                                    </div>

                                    {/* 身份确立列表 */}
                                    {opponentTeam[activeSlot].types.length > 0 && (
                                        <div className="mt-4 pt-6 border-t border-pink-100">
                                            <p className="text-[10px] font-black text-pink-500 uppercase mb-4 text-center">点击下方名字锁定对手身份</p>
                                            <div className="flex flex-wrap gap-2 justify-center max-h-40 overflow-y-auto scrollbar-hide bg-white/40 p-4 rounded-3xl">
                                                {getMatchingPets(opponentTeam[activeSlot].types).map(p => (
                                                    <button key={p.name} onClick={() => confirmPet(p.name)} className={`px-4 py-2 text-[10px] font-bold rounded-xl transition-all ${opponentTeam[activeSlot].confirmedName === p.name ? 'bg-pink-500 text-white shadow-lg' : 'bg-white text-slate-600 border border-pink-50 hover:bg-pink-50'}`}>{p.name}</button>
                                                ))}
                                                {getMatchingPets(opponentTeam[activeSlot].types).length === 0 && <span className="text-[10px] text-slate-400 italic">图库暂无匹配</span>}
                                            </div>
                                        </div>
                                    )}

                                    <button onClick={() => setOpponentTeam(Array(6).fill(null).map(() => ({ types: [], confirmedName: null })))} className="w-full mt-8 py-3 bg-white text-rose-500 text-[10px] font-black rounded-2xl border border-rose-100 hover:bg-rose-50 transition-all flex items-center justify-center gap-2 shadow-sm"><LucideIcon name="refresh-ccw" size={12} /> 重置所有录入</button>
                                </div>
                            </section>
                        </div>

                        {/* 右侧分析区 */}
                        <div className="lg:col-span-7">
                            <div className="bg-white/90 rounded-[3.5rem] shadow-2xl overflow-hidden flex flex-col min-h-[850px] border border-pink-50">
                                <div className="bg-slate-900 p-10 flex items-center justify-between text-white">
                                    <div className="flex items-center gap-5">
                                        <div className="w-16 h-16 rounded-[1.8rem] bg-pink-500/20 flex items-center justify-center text-pink-500 shadow-inner"><LucideIcon name="swords" size={32} /></div>
                                        <div><h3 className="font-black text-2xl tracking-tighter">廖洁的深度作战建议</h3><p className="text-[10px] text-pink-400 font-black tracking-[0.3em] mt-1 uppercase opacity-80">Battle Plan Command</p></div>
                                    </div>
                                </div>

                                <div className="p-10 grow scrollbar-hide overflow-y-auto bg-slate-50/20">
                                    {tacticalReport.mvps.length > 0 ? (
                                        <div className="space-y-10 animate-in slide-in-from-bottom-10 duration-700">
                                            <div className="p-6 bg-indigo-50/80 border border-indigo-100 rounded-3xl flex items-start gap-4">
                                                <LucideIcon name="info" size={20} className="text-indigo-400 shrink-0 mt-1" />
                                                <p className="text-indigo-500/80 text-[11px] font-bold leading-relaxed">廖洁，已从全量图库中筛选出优势最大的 10 个方案。针对**[已锁定]**的目标进行精准对位打击时，胜率将大幅提升。</p>
                                            </div>

                                            <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                                {tacticalReport.mvps.map((pet) => (
                                                    <div key={pet.name} className={`group p-8 rounded-[3.2rem] bg-white border-2 transition-all hover:scale-[1.03] flex flex-col relative overflow-hidden ${pet.danger <= 1 ? 'border-emerald-100 shadow-emerald-50' : (pet.danger >= 3 ? 'border-rose-100 shadow-rose-50' : 'border-pink-100 shadow-pink-50')}`}>
                                                        <div className="flex items-start justify-between mb-8">
                                                            <div className="flex-1">
                                                                <div className="flex items-center gap-2 mb-2">
                                                                    <span className={`text-[9px] font-black px-3 py-1 rounded-full uppercase shadow-sm ${pet.danger >= 3 ? 'bg-rose-500 text-white' : 'bg-emerald-500 text-white'}`}>{pet.danger >= 3 ? '环境刺客' : '全能核心'}</span>
                                                                </div>
                                                                <h4 className="text-2xl font-black text-slate-800 tracking-tighter">{pet.name}</h4>
                                                            </div>
                                                            <div className="flex gap-1.5">
                                                                {pet.types.map(t => <span key={t} className={`w-10 h-10 rounded-[1.2rem] ${TYPE_COLORS[t]} flex items-center justify-center text-xs text-white font-black shadow-lg border-2 border-white/20`}>{t[0]}</span>)}
                                                            </div>
                                                        </div>

                                                        <div className="bg-slate-50 rounded-[2.5rem] p-6 mt-auto border border-slate-100 group-hover:bg-white group-hover:border-pink-100 transition-all">
                                                            <p className="text-[11px] font-black text-slate-400 uppercase tracking-widest text-center w-full mb-4 underline decoration-pink-200">精准克制名单</p>
                                                            <div className="flex flex-wrap gap-2 justify-center">
                                                                {pet.targets.map(target => (
                                                                    <div key={target.index} className={`px-3 py-2 text-[10px] font-black rounded-xl shadow-sm flex items-center gap-2 ${target.isConfirmed ? 'bg-pink-500 text-white' : 'bg-white text-slate-700 border border-slate-100'}`}>
                                                                        <span className={`w-4 h-4 flex items-center justify-center rounded-md font-bold text-[8px] ${target.isConfirmed ? 'bg-white/20' : 'bg-slate-800 text-white'}`}>{target.index}</span>
                                                                        {target.isConfirmed && <LucideIcon name="lock" size={8} fill="white" />}
                                                                        {target.idName}
                                                                    </div>
                                                                ))}
                                                            </div>
                                                        </div>

                                                        <div className="flex items-center justify-between mt-8 px-2 pt-6 border-t border-slate-50">
                                                            <div><p className="text-[9px] font-black text-slate-300 uppercase">打击覆盖</p><p className="text-xl font-black text-emerald-500">{pet.targets.length}<span className="text-xs text-slate-400 ml-1">/ 6</span></p></div>
                                                            <div className="text-right"><p className="text-[9px] font-black text-slate-300 uppercase">生存环境</p><p className={`text-xl font-black ${pet.danger >= 3 ? 'text-rose-400' : 'text-blue-500'}`}>{pet.danger >= 3 ? '高风险' : '低风险'}</p></div>
                                                        </div>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                    ) : (
                                        <div className="h-full flex flex-col items-center justify-center opacity-40 py-48 text-center px-10">
                                            <div className="relative mb-10 scale-125"><LucideIcon name="layout-grid" size={100} className="text-pink-100" /><div className="absolute inset-0 flex items-center justify-center"><LucideIcon name="heart" size={40} className="text-pink-300 animate-pulse" fill="currentColor" /></div></div>
                                            <h4 className="text-2xl font-black text-slate-400 mb-4 tracking-tighter text-center">廖洁，录入并锁定对手身份</h4>
                                            <p className="font-bold text-slate-400 text-xs tracking-[0.2em] leading-loose max-w-xs mx-auto">选定槽位 -> 点击属性 -> 从列表锁定宠物</p>
                                        </div>
                                    )}
                                </div>
                                <footer className="p-8 border-t border-pink-50 text-center bg-white/50 text-[10px] font-black text-pink-300 uppercase tracking-[0.6em]">Dedicated To Liao Jie · Full-Database Edition</footer>
                            </div>
                        </div>
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
