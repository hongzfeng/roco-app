<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>廖洁专属 · 洛克王国爱意助手</title>
    <!-- 依赖镜像 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/react@18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@babel/standalone@7.26.9/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/lucide@0.321.0/dist/umd/lucide.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;700;900&display=swap');
        body { 
            background: linear-gradient(135deg, #fff5f7 0%, #f3e8ff 100%); 
            font-family: 'Noto Sans SC', sans-serif;
            overflow-x: hidden;
            min-height: 100vh;
            color: #1e293b;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 20px 40px -10px rgba(244, 114, 182, 0.15);
        }
        .floating { animation: floating 3s ease-in-out infinite; }
        @keyframes floating { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(-10px); } }
        .love-burst { animation: burst 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes burst { 0% { transform: scale(0.8); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .mvp-glow { box-shadow: 0 0 25px rgba(236, 72, 153, 0.4); border: 2.5px solid #f472b6; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect, useRef } = React;

        // === 1. 数据区：全量内置官方规则 ===
        const TYPE_RULES_DATA = {"普通":{"strong":[""],"resist":["地","幽","机械"],"weak":["武"],"vulnerable":["幽"]},"草":{"strong":["水","光","地"],"resist":["火","龙","毒","虫","翼","机械"],"weak":["火","冰","毒","虫","翼"],"vulnerable":["水","地","电","光"]},"火":{"strong":["草","冰","虫","机械"],"resist":["水","地","龙"],"weak":["水","地"],"vulnerable":["草","冰","虫","萌","机械"]},"水":{"strong":["火","地","机械"],"resist":["草","冰","龙"],"weak":["草","电"],"vulnerable":["火","机械"]},"光":{"strong":["幽","恶"],"resist":["草","冰"],"weak":["草","幽"],"vulnerable":["恶","幻"]},"地":{"strong":["火","冰","电","毒"],"resist":["草","武"],"weak":["草","水","冰","武","机械"],"vulnerable":["普通","火","电","毒","翼"]},"冰":{"strong":["草","地","龙","翼"],"resist":["火","冰","机械"],"weak":["火","地","武","机械"],"vulnerable":["水","冰","光"]},"龙":{"strong":["龙"],"resist":["机械"],"weak":["冰","龙","萌"],"vulnerable":["草","火","水","电","翼"]},"电":{"strong":["水","翼"],"resist":["草","地","龙","电"],"weak":["地"],"vulnerable":["电","翼","机械"]},"毒":{"strong":["草","萌"],"resist":["地","毒","幽","机械"],"weak":["地","恶","幻"],"vulnerable":["草","毒","虫","武","萌"]},"虫":{"strong":["草","恶","幻"],"resist":["火","毒","武","翼","萌","幽","机械"],"weak":["火","翼"],"vulnerable":["草","武"]},"武":{"strong":["普通","地","冰","恶","机械"],"resist":["毒","虫","翼","萌","幽","幻"],"weak":["翼","萌","幻"],"vulnerable":["地","虫","恶"]},"翼":{"strong":["草","虫","武"],"resist":["地","龙","电","机械"],"weak":["冰","电"],"vulnerable":["草","虫","武"]},"萌":{"strong":["龙","武","恶"],"resist":["火","毒","机械"],"weak":["毒","恶","机械"],"vulnerable":["虫","武"]},"幽":{"strong":["光","幽","幻"],"resist":["普通","恶"],"weak":["光","幽","恶"],"vulnerable":["普通","毒","虫","武"]},"恶":{"strong":["毒","萌","幽"],"resist":["光","武","恶"],"weak":["光","虫","武","萌"],"vulnerable":["幽","恶"]},"机械":{"strong":["地","冰","萌"],"resist":["火","水","电","机械"],"weak":["火","水","武"],"vulnerable":["普通","草","冰","龙","毒","虫","翼","萌","机械","幻"]},"幻":{"strong":["毒","武"],"resist":["光","机械","幻"],"weak":["虫","幽"],"vulnerable":["武","幻"]}};
        
        // === 2. 数据区：全量内置精灵图鉴 ===
        const PET_DATA = [{"name":"迪莫","types":["光"]},{"name":"魔力猫","types":["草"]},{"name":"火神","types":["火"]},{"name":"水灵","types":["水"]},{"name":"花影羚羊","types":["幽","恶"]},{"name":"雪绒鸟","types":["翼"]},{"name":"石冠王蜥","types":["地"]},{"name":"化蝶","types":["虫","萌"]},{"name":"罗隐","types":["地","恶"]},{"name":"雪影娃娃","types":["冰","萌"]},{"name":"圣羽翼王","types":["翼"]},{"name":"皇家狮鹫","types":["翼"]},{"name":"棋绮后","types":["武","地"]},{"name":"伊兰龙","types":["龙"]},{"name":"迷迷箱怪","types":["机械","幻"]},{"name":"烈火守护","types":["火"]},{"name":"翼龙","types":["龙","翼"]},{"name":"龙鱼","types":["水","龙"]},{"name":"火焰猿","types":["火"]},{"name":"红绒十字","types":["火","萌"]},{"name":"乌拉塔","types":["恶","火"]},{"name":"立方人","types":["机械"]},{"name":"武者鸡","types":["火","武"]},{"name":"格兰球","types":["草"]},{"name":"遁地鼠","types":["地"]},{"name":"秩序鱿墨","types":["幽","萌"]},{"name":"寂灭骨龙","types":["龙","幽"]},{"name":"厉毒修萝","types":["毒","恶"]},{"name":"龙息帕尔","types":["恶"]},{"name":"食尘短绒","types":["虫","地"]},{"name":"画间法师手","types":["普通","幻"]},{"name":"古卷执政官","types":["普通","幻"]},{"name":"绒仙子","types":["光","虫"]},{"name":"疾光千兽","types":["光"]},{"name":"熔岩布丁","types":["水","火"]},{"name":"利灯鱼","types":["水","电"]},{"name":"月牙雪熊","types":["冰","幻"]},{"name":"窃光蚊","types":["恶","光"]},{"name":"燃薪虫","types":["火","草"]},{"name":"夜枭","types":["幽"]},{"name":"小皮球","types":["电","幻"]},{"name":"贝古斯","types":["机械","火"]},{"name":"落陨星兔","types":["幻","幽"]},{"name":"上岸蛙","types":["幻"]},{"name":"雅丹鬃","types":["火"]},{"name":"春花兔","types":["草"]},{"name":"暮星辰","types":["幻","翼"]}];

        const TYPE_COLORS = {
            '普通': 'bg-stone-300', '火': 'bg-rose-400', '水': 'bg-sky-400', '草': 'bg-emerald-400',
            '电': 'bg-amber-300', '冰': 'bg-blue-200', '武': 'bg-orange-500', '毒': 'bg-fuchsia-400',
            '地': 'bg-yellow-600', '翼': 'bg-indigo-300', '虫': 'bg-lime-400', '石': 'bg-gray-500',
            '幽': 'bg-violet-500', '龙': 'bg-purple-600', '恶': 'bg-slate-700', '机械': 'bg-zinc-400',
            '萌': 'bg-pink-400', '光': 'bg-yellow-100 text-yellow-800', '幻': 'bg-pink-500'
        };

        // 图标组件
        const LucideIcon = ({ name, size = 20, className = "", fill = "none" }) => {
            const containerRef = useRef(null);
            useEffect(() => {
                if (window.lucide && containerRef.current) {
                    containerRef.current.innerHTML = `<i data-lucide="${name}" class="${className}" style="width: ${size}px; height: ${size}px; fill: ${fill}"></i>`;
                    window.lucide.createIcons({ root: containerRef.current });
                }
            }, [name, size, className, fill]);
            return <span ref={containerRef} className="inline-flex items-center justify-center"></span>;
        };

        function App() {
            const [opponentTeam, setOpponentTeam] = useState(Array(6).fill([]));
            const [activeSlot, setActiveSlot] = useState(0);

            const getRawMult = (atk, def) => {
                if (!TYPE_RULES_DATA[atk]) return 1;
                if (TYPE_RULES_DATA[atk].strong.includes(def)) return 2;
                if (TYPE_RULES_DATA[atk].resist.includes(def)) return 0.5;
                return 1;
            };

            // 精灵整体核心分析逻辑：加入具体靶点追踪
            const tacticalReport = useMemo(() => {
                const filledOppPets = opponentTeam.map((types, index) => ({ types, index: index + 1 })).filter(p => p.types.length > 0);
                if (filledOppPets.length === 0) return { mvps: [], riskTypes: [] };

                const analysis = PET_DATA.map(myPet => {
                    let targets = []; // 针对的目标编号列表
                    let dangerCount = 0;

                    filledOppPets.forEach(opp => {
                        // 进攻端：能否克制该目标
                        const canHit = myPet.types.some(myT => {
                            let m = 1.0;
                            opp.types.forEach(oppT => m *= getRawMult(myT, oppT));
                            return m > 1;
                        });
                        if (canHit) targets.push(opp.index);

                        // 防御端：该目标是否克制我
                        const getsHit = opp.types.some(oppT => {
                            let m = 1.0;
                            myPet.types.forEach(myT => m *= getRawMult(oppT, myT));
                            return m > 1;
                        });
                        if (getsHit) dangerCount++;
                    });

                    return { ...myPet, targets, danger: dangerCount };
                });

                // MVP 筛选逻辑
                const mvps = analysis
                    .filter(p => p.targets.length >= 1)
                    .sort((a, b) => b.targets.length - a.targets.length || a.danger - b.danger)
                    .slice(0, 10);

                return { mvps };
            }, [opponentTeam]);

            return (
                <div className="max-w-6xl mx-auto p-4 md:p-8 relative min-h-screen">
                    <header className="flex flex-col md:flex-row items-center justify-between mb-8 gap-6">
                        <div className="flex items-center gap-5">
                            <div className="bg-pink-500 p-4 rounded-[2.5rem] shadow-lg shadow-pink-200 floating text-white">
                                <LucideIcon name="crosshair" size={32} fill="white" />
                            </div>
                            <div>
                                <h1 className="text-4xl font-black">廖洁专属 <span className="text-pink-500">·</span> 战术指挥官</h1>
                                <p className="text-pink-400 font-bold text-xs mt-1 uppercase tracking-widest flex items-center gap-2">
                                    <LucideIcon name="shield-check" size={14} fill="#ec4899" /> 6v6 精准打击对位系统
                                </p>
                            </div>
                        </div>
                    </header>

                    <main className="grid grid-cols-1 lg:grid-cols-12 gap-8">
                        {/* 左侧录入：对手战队 */}
                        <div className="lg:col-span-5 space-y-6">
                            <section className="glass-card p-8 rounded-[3.5rem] shadow-2xl">
                                <h2 className="text-xl font-black mb-6 flex items-center gap-3">
                                    <LucideIcon name="swords" className="text-pink-500" /> 对手全战队录入
                                </h2>
                                <div className="grid grid-cols-3 gap-3 mb-8">
                                    {opponentTeam.map((pet, idx) => (
                                        <button 
                                            key={idx}
                                            onClick={() => setActiveSlot(idx)}
                                            className={`h-24 rounded-[2rem] border-2 transition-all flex flex-col items-center justify-center gap-2 ${activeSlot === idx ? 'border-pink-400 bg-pink-50 shadow-md scale-105' : 'border-slate-100 bg-white/50'}`}
                                        >
                                            <span className="text-[10px] font-black text-slate-400">PET {idx+1}</span>
                                            <div className="flex gap-1">
                                                {pet.length > 0 ? pet.map(t => (
                                                    <div key={t} className={`w-6 h-6 rounded-full ${TYPE_COLORS[t]} flex items-center justify-center text-[8px] text-white font-bold shadow-sm`}>{t[0]}</div>
                                                )) : <LucideIcon name="plus" size={16} className="text-slate-200" />}
                                            </div>
                                        </button>
                                    ))}
                                </div>
                                <div className="p-6 bg-pink-50/50 rounded-3xl border-2 border-pink-100">
                                    <h3 className="text-[11px] font-black text-pink-400 mb-4 uppercase tracking-widest text-center">录入精灵 {activeSlot + 1} 的属性</h3>
                                    <div className="grid grid-cols-4 gap-2">
                                        {Object.keys(TYPE_RULES_DATA).map(type => (
                                            <button 
                                                key={type}
                                                onClick={() => {
                                                    const newTeam = [...opponentTeam];
                                                    const cur = newTeam[activeSlot];
                                                    newTeam[activeSlot] = cur.includes(type) ? cur.filter(t=>t!==type) : (cur.length < 2 ? [...cur, type] : cur);
                                                    setOpponentTeam(newTeam);
                                                }}
                                                className={`py-2 rounded-xl font-black text-[10px] transition-all border ${
                                                    opponentTeam[activeSlot].includes(type) 
                                                    ? `${TYPE_COLORS[type]} text-white border-transparent shadow-md` 
                                                    : 'bg-white text-slate-400 border-slate-100'
                                                }`}
                                            >
                                                {type}
                                            </button>
                                        ))}
                                    </div>
                                    <button onClick={() => setOpponentTeam(Array(6).fill([]))} className="w-full mt-6 py-2 bg-white text-rose-400 text-[10px] font-black rounded-xl border border-rose-100 hover:bg-rose-50">清空敌方数据</button>
                                </div>
                            </section>
                        </div>

                        {/* 右侧：对位指令报告 */}
                        <div className="lg:col-span-7">
                            <div className="bg-white/90 rounded-[3.5rem] shadow-2xl overflow-hidden flex flex-col min-h-[750px] border border-pink-50">
                                <div className="bg-slate-900 p-8 flex items-center justify-between text-white">
                                    <div className="flex items-center gap-4">
                                        <div className="w-14 h-14 rounded-2xl bg-pink-500/20 flex items-center justify-center text-pink-500 shadow-lg">
                                            <LucideIcon name="zap" size={28} fill="currentColor" />
                                        </div>
                                        <div>
                                            <h3 className="font-black text-2xl tracking-tight">廖洁的作战指挥部</h3>
                                            <p className="text-[10px] text-pink-400 font-black tracking-widest mt-1 uppercase">Target-Specific Strategy Report</p>
                                        </div>
                                    </div>
                                </div>

                                <div className="p-8 grow scrollbar-hide overflow-y-auto bg-slate-50/30">
                                    {tacticalReport.mvps.length > 0 ? (
                                        <div className="space-y-8 animate-in fade-in duration-700">
                                            
                                            <div className="p-6 bg-blue-50 border border-blue-100 rounded-3xl text-blue-500 text-xs font-bold leading-relaxed flex items-start gap-3">
                                                <LucideIcon name="info" size={16} className="shrink-0" />
                                                <p>报告说明：系统已为你规划好了对位关系。请根据对方派出的精灵编号，选择我方对应的“针对性出战精灵”。如果压力极高，请等待对方出招后再切换入场。</p>
                                            </div>

                                            <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                                {tacticalReport.mvps.map((pet, idx) => (
                                                    <div key={pet.name} className={`p-6 rounded-[2.5rem] bg-white border-2 transition-all hover:scale-[1.02] relative overflow-hidden flex flex-col ${pet.danger <= 1 ? 'border-emerald-100 shadow-emerald-50' : (pet.danger >= 3 ? 'border-rose-100 shadow-rose-50' : 'border-pink-50 shadow-sm')}`}>
                                                        
                                                        <div className="flex items-start justify-between mb-4">
                                                            <div className="flex-1">
                                                                <div className="flex items-center gap-2 mb-1">
                                                                    <span className={`text-[9px] font-black px-2 py-0.5 rounded-full uppercase ${pet.danger >= 3 ? 'bg-rose-500 text-white' : 'bg-emerald-500 text-white'}`}>
                                                                        {pet.danger >= 3 ? '战术尖刀' : '稳健核心'}
                                                                    </span>
                                                                </div>
                                                                <h4 className="text-xl font-black text-slate-800">{pet.name}</h4>
                                                            </div>
                                                            <div className="flex gap-1">
                                                                {pet.types.map(t => (
                                                                    <span key={t} className={`w-8 h-8 rounded-xl ${TYPE_COLORS[t]} flex items-center justify-center text-[10px] text-white font-bold shadow-sm`}>{t[0]}</span>
                                                                ))}
                                                            </div>
                                                        </div>

                                                        {/* 精准对位信息区 */}
                                                        <div className="bg-slate-50/50 rounded-2xl p-4 mt-auto">
                                                            <div className="flex items-center gap-2 mb-3">
                                                                <LucideIcon name="target" size={12} className="text-pink-500" />
                                                                <p className="text-[10px] font-black text-slate-400 uppercase tracking-tighter">建议针对目标</p>
                                                            </div>
                                                            <div className="flex flex-wrap gap-2">
                                                                {pet.targets.map(num => (
                                                                    <span key={num} className="px-3 py-1 bg-white text-slate-800 text-[10px] font-black rounded-lg border border-slate-100 shadow-sm">
                                                                        敌方 Pet {num}
                                                                    </span>
                                                                ))}
                                                            </div>
                                                        </div>

                                                        <div className="flex items-center justify-between mt-4 pt-4 border-t border-slate-50">
                                                            <div className="text-center">
                                                                <p className="text-[8px] font-black text-slate-300 uppercase">压制面</p>
                                                                <p className="text-sm font-black text-emerald-500">{pet.targets.length}/6</p>
                                                            </div>
                                                            <div className="text-center">
                                                                <p className="text-[8px] font-black text-slate-300 uppercase">生存压力</p>
                                                                <p className={`text-sm font-black ${pet.danger >= 3 ? 'text-rose-500' : 'text-blue-500'}`}>
                                                                    {pet.danger >= 4 ? '极危' : (pet.danger >= 2 ? '较高' : '极稳')}
                                                                </p>
                                                            </div>
                                                        </div>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                    ) : (
                                        <div className="h-full flex flex-col items-center justify-center opacity-40 py-40 text-center">
                                            <LucideIcon name="layout-grid" size={84} className="text-pink-200 animate-pulse mb-6" />
                                            <p className="font-black text-slate-400 tracking-widest text-sm leading-relaxed">
                                                廖洁，在左侧录入对手的 6 只精灵属性<br/>
                                                系统将为你精准匹配“克制靶点”
                                            </p>
                                        </div>
                                    )}
                                </div>

                                <footer className="p-8 border-t border-pink-50 text-center bg-white/50 text-[10px] font-black text-pink-300 uppercase tracking-[0.4em]">
                                    Match-up Logic Engine · Designed for Liao Jie
                                </footer>
                            </div>
                        </div>
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
