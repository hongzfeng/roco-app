<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>廖洁专属 · 洛克王国爱意助手</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;700;900&display=swap');
        body { 
            background: linear-gradient(135deg, #fff5f7 0%, #f3e8ff 100%); 
            font-family: 'Noto Sans SC', sans-serif;
            min-height: 100vh;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 20px 40px -10px rgba(244, 114, 182, 0.1);
        }
        .floating { animation: floating 3s ease-in-out infinite; }
        @keyframes floating { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(-10px); } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect, useRef } = React;

        // === 数据源（强制使用 HTTPS 确保安全连接） ===
        const RULES_URL = "https://raw.githubusercontent.com/hongzfeng/roco-data/refs/heads/main/official_type_rules.json"; 
        const PETS_URL = "https://raw.githubusercontent.com/hongzfeng/roco-data/refs/heads/main/roco_pets_cards.json";

        const TYPE_COLORS = {
            '普通': 'bg-stone-300', '火': 'bg-rose-400', '水': 'bg-sky-400', '草': 'bg-emerald-400',
            '电': 'bg-amber-300', '冰': 'bg-blue-200', '武': 'bg-orange-500', '毒': 'bg-fuchsia-400',
            '地': 'bg-yellow-600', '翼': 'bg-indigo-300', '虫': 'bg-lime-400', '石': 'bg-gray-500',
            '幽': 'bg-violet-500', '龙': 'bg-purple-600', '恶': 'bg-slate-700', '机械': 'bg-zinc-400',
            '萌': 'bg-pink-400', '光': 'bg-yellow-100 text-yellow-800', '幻': 'bg-pink-500'
        };

        const LOVE_QUOTES = [
            "廖洁，今天的你比光系精灵还要闪耀 ✨",
            "遇见你是我在洛克王国抓到的最稀有的‘精灵’ ❤️",
            "不管属性如何克制，我对你的爱永远是3倍伤害！",
            "廖洁，你是我的专属守护神 👼",
            "和你在一起的每一秒，都是我的极致克制时刻。"
        ];

        const LucideIcon = ({ name, size = 20, className = "", fill = "none" }) => {
            const containerRef = useRef(null);
            useEffect(() => {
                if (window.lucide && containerRef.current) {
                    containerRef.current.innerHTML = `<i data-lucide="${name}" class="${className}" style="width: ${size}px; height: ${size}px; fill: ${fill}"></i>`;
                    window.lucide.createIcons({ root: containerRef.current });
                }
            }, [name, size, className, fill]);
            return <span ref={containerRef} className="inline-flex items-center justify-center"></span>;
        };

        function App() {
            const [data, setData] = useState({ rules: null, pets: [] });
            const [loading, setLoading] = useState(true);
            const [error, setError] = useState(null);
            const [defenders, setDefenders] = useState([]);
            const [quote, setQuote] = useState(LOVE_QUOTES[0]);

            useEffect(() => {
                async function init() {
                    try {
                        const [rRes, pRes] = await Promise.all([
                            fetch(RULES_URL).catch(() => { throw new Error("无法连接克制规则服务器") }),
                            fetch(PETS_URL).catch(() => { throw new Error("无法连接精灵图鉴服务器") })
                        ]);
                        
                        if (!rRes.ok || !pRes.ok) {
                            throw new Error(`GitHub 拒绝访问 (状态码: ${rRes.status})。请检查仓库是否为 Public。`);
                        }
                        
                        const rules = await rRes.json();
                        const rawPets = await pRes.json();
                        
                        const WIKI_MAP = { '幽灵': '幽', '恶魔': '恶', '土': '地' };
                        const processedPets = rawPets.map(p => {
                            const clean = new Set();
                            if (Array.isArray(p.types)) {
                                p.types.forEach(tg => {
                                    if (typeof tg === 'string') {
                                        tg.split(',').forEach(t => {
                                            let s = t.trim(); s = WIKI_MAP[s] || s;
                                            if (rules[s]) clean.add(s);
                                        });
                                    }
                                });
                            }
                            return { name: p.name, types: Array.from(clean) };
                        });
                        
                        setData({ rules, pets: processedPets });
                        setLoading(false);
                    } catch (e) { 
                        setError(e.message);
                        setLoading(false);
                    }
                }
                init();
            }, []);

            const results = useMemo(() => {
                if (!data.rules || defenders.length === 0) return null;
                const res = { '3': [], '2': [], '1': [], '0.5': [], '0.25': [], '0': [] };
                Object.keys(data.rules).forEach(attacker => {
                    let m = 1;
                    defenders.forEach(def => {
                        if (data.rules[attacker].strong.includes(def)) m *= 2;
                        if (data.rules[attacker].resist.includes(def)) m *= 0.5;
                    });
                    if (m >= 4) m = 3;
                    const key = m.toString();
                    if (res[key]) res[key].push(attacker);
                    else if (m < 0.25 && m > 0) res['0.25'].push(attacker);
                    else if (m === 0) res['0'].push(attacker);
                });
                return res;
            }, [defenders, data.rules]);

            if (loading) return (
                <div className="h-screen flex flex-col items-center justify-center">
                    <div className="relative">
                        <div className="w-20 h-20 border-4 border-pink-100 border-t-pink-500 rounded-full animate-spin"></div>
                        <div className="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2">
                             <LucideIcon name="heart" size={32} fill="#ec4899" className="animate-pulse text-pink-500" />
                        </div>
                    </div>
                    <p className="mt-6 font-bold text-pink-400 tracking-widest animate-bounce">正在为 廖洁 同步云端数据...</p>
                </div>
            );

            if (error) return (
                <div className="h-screen flex items-center justify-center p-4">
                    <div className="glass-card p-8 rounded-3xl text-center shadow-xl max-w-sm">
                        <LucideIcon name="cloud-off" size={48} className="text-rose-500 mb-4" />
                        <h2 className="text-lg font-bold text-slate-800 mb-2">连接服务器失败</h2>
                        <p className="text-rose-400 text-xs mb-6 leading-relaxed">{error}</p>
                        <div className="space-y-2">
                            <button onClick={() => window.location.reload()} className="w-full py-3 bg-pink-500 text-white rounded-xl font-bold shadow-lg shadow-pink-200 active:scale-95 transition-transform">点此刷新重试</button>
                            <p className="text-[10px] text-slate-400">提示：请确保你的数据仓库已设为 Public</p>
                        </div>
                    </div>
                </div>
            );

            return (
                <div className="max-w-6xl mx-auto p-4 md:p-8 relative min-h-screen">
                    <header className="flex flex-col md:flex-row items-center justify-between mb-12 gap-6 relative z-10">
                        <div className="flex items-center gap-5">
                            <div className="bg-pink-500 p-4 rounded-[2rem] shadow-lg shadow-pink-200 floating">
                                <LucideIcon name="sparkles" size={32} className="text-white" />
                            </div>
                            <div>
                                <h1 className="text-4xl font-black text-slate-800">廖洁专属 <span className="text-pink-500">·</span> 爱意助手</h1>
                                <p className="text-pink-400 font-bold text-xs mt-1 uppercase tracking-[0.2em] flex items-center gap-2">
                                    <LucideIcon name="heart" size={12} fill="#ec4899" /> 实时数据引擎已连接
                                </p>
                            </div>
                        </div>
                    </header>

                    <div className="mb-10 text-center">
                        <p className="inline-block px-8 py-3 bg-white/70 backdrop-blur border border-pink-200 rounded-full text-pink-600 font-bold text-sm italic shadow-sm">
                            " {quote} "
                        </p>
                    </div>

                    <main className="grid grid-cols-1 lg:grid-cols-12 gap-8 relative z-10">
                        <div className="lg:col-span-5 space-y-6">
                            <section className="glass-card p-8 rounded-[3rem] shadow-xl">
                                <h2 className="text-xl font-black text-slate-800 mb-6 flex items-center gap-3">
                                    <LucideIcon name="shield" className="text-pink-500" /> 设定对方属性
                                </h2>
                                <div className="grid grid-cols-4 sm:grid-cols-5 gap-3">
                                    {Object.keys(data.rules).map(type => (
                                        <button 
                                            key={type}
                                            onClick={() => defenders.includes(type) ? setDefenders(defenders.filter(t => t!==type)) : defenders.length<2 && setDefenders([...defenders, type])}
                                            className={`py-3 rounded-2xl font-black text-xs transition-all border ${
                                                defenders.includes(type) 
                                                ? `${TYPE_COLORS[type]} text-white border-transparent ring-4 ring-pink-100 shadow-lg scale-95` 
                                                : 'bg-white/50 text-slate-500 border-slate-100 hover:border-pink-200 hover:text-pink-500'
                                            }`}
                                        >
                                            {type}
                                        </button>
                                    ))}
                                </div>
                            </section>
                        </div>

                        <div className="lg:col-span-7">
                            <div className="bg-white/90 rounded-[3rem] shadow-2xl shadow-pink-100/50 overflow-hidden flex flex-col min-h-[500px]">
                                <div className="bg-slate-900 p-8 flex items-center justify-between text-white">
                                    <div className="flex items-center gap-4">
                                        <div className="w-12 h-12 rounded-2xl bg-pink-500/20 flex items-center justify-center text-pink-500">
                                            <LucideIcon name="swords" size={24} />
                                        </div>
                                        <h3 className="font-black text-xl tracking-tight">战斗方案分析</h3>
                                    </div>
                                    <button onClick={() => setDefenders([])} className="p-2 hover:bg-white/10 rounded-full transition-colors">
                                        <LucideIcon name="refresh-cw" size={18} />
                                    </button>
                                </div>

                                <div className="p-8 grow">
                                    {!results ? (
                                        <div className="h-full flex flex-col items-center justify-center space-y-6 opacity-40 py-20">
                                            <LucideIcon name="heart" size={64} className="text-pink-200 animate-pulse" fill="#fecdd3" />
                                            <p className="font-bold text-slate-400">廖洁，请选择属性开始</p>
                                        </div>
                                    ) : (
                                        <div className="space-y-6">
                                            {['3', '2'].map(val => results[val].length > 0 && (
                                                <div key={val} className={`p-6 rounded-[2.5rem] border-2 ${val === '3' ? 'bg-pink-50/50 border-pink-100' : 'bg-orange-50/50 border-orange-100'}`}>
                                                    <h3 className={`font-black text-lg mb-4 flex items-center gap-2 ${val === '3' ? 'text-pink-600' : 'text-orange-600'}`}>
                                                        <LucideIcon name="zap" size={18} fill="currentColor" /> {val}x 打击属性
                                                    </h3>
                                                    <div className="flex flex-wrap gap-2">
                                                        {results[val].map(t => (
                                                            <span key={t} className={`px-5 py-2 rounded-xl text-white font-black text-sm shadow-md ${TYPE_COLORS[t]}`}>{t}</span>
                                                        ))}
                                                    </div>
                                                </div>
                                            ))}
                                            <div className="pt-6 border-t border-slate-100 text-center">
                                                <p className="text-[10px] font-black text-slate-300 uppercase tracking-widest leading-loose">
                                                    已从 GITHUB 同步 {data.pets.length} 只精灵数据
                                                </p>
                                            </div>
                                        </div>
                                    )}
                                </div>
                            </div>
                        </div>
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
