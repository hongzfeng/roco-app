<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>洛克王国属性克制助手 - 旗舰发布版</title>
    <!-- 核心依赖 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700;900&display=swap');
        body { 
            background-color: #f8fafc; 
            font-family: 'Noto Sans SC', sans-serif;
            color: #1e293b;
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(226, 232, 240, 0.8);
        }
        .custom-shadow {
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.05);
        }
        .type-btn { transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); }
        .type-btn:hover:not(:disabled) { transform: translateY(-2px); filter: brightness(1.05); }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect } = React;

        // === 1. 配置区：使用你提供的正式 GitHub Raw 链接 ===
        const RULES_URL = "https://raw.githubusercontent.com/hongzfeng/roco-data/refs/heads/main/official_type_rules.json"; 
        const PETS_URL = "https://raw.githubusercontent.com/hongzfeng/roco-data/refs/heads/main/roco_pets_cards.json";

        const TYPE_COLORS = {
            '普通': 'bg-stone-400', '火': 'bg-red-500', '水': 'bg-blue-500', '草': 'bg-green-500',
            '电': 'bg-yellow-400', '冰': 'bg-cyan-400', '武': 'bg-orange-700', '毒': 'bg-purple-500',
            '地': 'bg-amber-700', '翼': 'bg-sky-400', '虫': 'bg-lime-500', '石': 'bg-stone-600',
            '幽': 'bg-indigo-800', '龙': 'bg-violet-600', '恶': 'bg-slate-800', '机械': 'bg-slate-400',
            '萌': 'bg-pink-400', '光': 'bg-yellow-200', '幻': 'bg-fuchsia-500'
        };

        function App() {
            const [data, setData] = useState({ rules: null, pets: [] });
            const [loading, setLoading] = useState(true);
            const [error, setError] = useState(null);
            const [defenders, setDefenders] = useState([]);

            // === 数据加载引擎 ===
            useEffect(() => {
                async function init() {
                    try {
                        const [rulesRes, petsRes] = await Promise.all([
                            fetch(RULES_URL),
                            fetch(PETS_URL)
                        ]);
                        if (!rulesRes.ok || !petsRes.ok) throw new Error("无法从 GitHub 获取数据");
                        
                        const rules = await rulesRes.json();
                        const rawPets = await petsRes.json();

                        // 数据清洗与映射
                        const WIKI_MAP = { '幽灵': '幽', '恶魔': '恶', '土': '地' };
                        const processedPets = rawPets.map(p => {
                            const cleanTypes = new Set();
                            p.types.forEach(tg => tg.split(',').forEach(t => {
                                let s = t.trim();
                                s = WIKI_MAP[s] || s;
                                if (rules[s]) cleanTypes.add(s);
                            }));
                            return { name: p.name, types: Array.from(cleanTypes) };
                        });

                        setData({ rules, pets: processedPets });
                        setLoading(false);
                    } catch (err) {
                        setError(err.message);
                        setLoading(false);
                    }
                }
                init();
            }, []);

            // 每次 defenders 变化后刷新图标
            useEffect(() => { if (!loading && window.lucide) window.lucide.createIcons(); }, [loading, defenders]);

            const allTypes = useMemo(() => data.rules ? Object.keys(data.rules) : [], [data.rules]);

            // === 核心计算逻辑 ===
            const results = useMemo(() => {
                if (!data.rules || defenders.length === 0) return null;
                const res = { '3': [], '2': [], '1': [], '0.5': [], '0.25': [] };
                
                allTypes.forEach(attacker => {
                    let multiplier = 1;
                    defenders.forEach(def => {
                        const rules = data.rules[attacker];
                        if (rules.strong.includes(def)) multiplier *= 2;
                        if (rules.resist.includes(def)) multiplier *= 0.5;
                    });
                    
                    if (multiplier >= 4) multiplier = 3; // 官方克制上限
                    const key = multiplier.toString();
                    if (res[key]) res[key].push(attacker);
                    else if (multiplier < 0.25) res['0.25'].push(attacker);
                });
                return res;
            }, [defenders, data.rules]);

            // === 精灵查找逻辑 ===
            const getRecommendedPets = (type) => {
                const matches = [];
                const seen = new Set();
                for (let i = data.pets.length - 1; i >= 0; i--) {
                    if (data.pets[i].types.includes(type) && !seen.has(data.pets[i].name)) {
                        matches.push(data.pets[i].name);
                        seen.add(data.pets[i].name);
                    }
                    if (matches.length >= 8) break;
                }
                return matches;
            };

            const getDefenderSpriteReference = useMemo(() => {
                if (defenders.length === 0) return [];
                const matches = [];
                const seen = new Set();
                for (let i = data.pets.length - 1; i >= 0; i--) {
                    if (defenders.every(t => data.pets[i].types.includes(t)) && !seen.has(data.pets[i].name)) {
                        matches.push(data.pets[i].name);
                        seen.add(data.pets[i].name);
                    }
                    if (matches.length >= 15) break;
                }
                return matches;
            }, [defenders, data.pets]);

            if (loading) return (
                <div className="h-screen flex flex-col items-center justify-center bg-slate-50">
                    <div className="w-16 h-16 border-4 border-indigo-100 border-t-indigo-600 rounded-full animate-spin mb-4"></div>
                    <p className="text-slate-400 font-black uppercase tracking-[0.2em] text-sm animate-pulse">正在同步 GitHub 远程图鉴...</p>
                </div>
            );

            if (error) return (
                <div className="h-screen flex items-center justify-center p-4">
                    <div className="bg-white p-8 rounded-3xl shadow-xl border border-red-100 text-center max-w-sm">
                        <i data-lucide="alert-circle" className="text-red-500 w-12 h-12 mx-auto mb-4"></i>
                        <h2 className="text-xl font-bold text-slate-800 mb-2">数据加载失败</h2>
                        <p className="text-slate-500 text-sm mb-6">{error}</p>
                        <button onClick={() => window.location.reload()} className="w-full py-3 bg-slate-800 text-white rounded-xl font-bold hover:bg-slate-700 transition-colors">重试</button>
                    </div>
                </div>
            );

            return (
                <div className="max-w-7xl mx-auto p-4 md:p-8">
                    <header className="flex flex-col md:flex-row items-center justify-between mb-10 gap-6">
                        <div className="flex items-center gap-4">
                            <div className="bg-indigo-600 p-4 rounded-2xl shadow-xl shadow-indigo-100">
                                <i data-lucide="zap" className="text-white w-8 h-8"></i>
                            </div>
                            <div>
                                <h1 className="text-4xl font-black text-slate-900 tracking-tight">洛克王国<span className="text-indigo-600">克制助手</span></h1>
                                <p className="text-slate-500 font-medium mt-1 uppercase text-xs tracking-widest flex items-center gap-2">
                                    <i data-lucide="award" size="14"></i> 旗舰版 · 实时数据同步
                                </p>
                            </div>
                        </div>
                        <div className="flex items-center gap-6 bg-white px-6 py-4 rounded-3xl custom-shadow border border-slate-50">
                            <div className="text-right">
                                <p className="text-[10px] uppercase font-black text-slate-400 tracking-tighter mb-1">数据库状态</p>
                                <p className="text-sm font-black text-emerald-500 flex items-center justify-end gap-1">
                                    <span className="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></span>
                                    {data.pets.length} 精灵已就绪
                                </p>
                            </div>
                            <div className="w-12 h-12 rounded-2xl bg-indigo-50 flex items-center justify-center text-indigo-600">
                                <i data-lucide="database" size="24"></i>
                            </div>
                        </div>
                    </header>

                    <main className="grid grid-cols-1 lg:grid-cols-12 gap-8">
                        {/* 左侧控制栏 */}
                        <div className="lg:col-span-5 space-y-8">
                            <section className="glass-panel p-8 rounded-[3rem] custom-shadow">
                                <div className="flex items-center justify-between mb-8">
                                    <h2 className="text-2xl font-black text-slate-800 flex items-center gap-3">
                                        <i data-lucide="shield" className="text-indigo-600"></i> 防守方设定
                                    </h2>
                                    <button onClick={() => setDefenders([])} className="p-2 hover:bg-slate-100 rounded-full transition-colors text-slate-400">
                                        <i data-lucide="refresh-cw" size="18"></i>
                                    </button>
                                </div>
                                
                                <div className="grid grid-cols-4 sm:grid-cols-5 lg:grid-cols-5 gap-3 mb-10">
                                    {allTypes.map(type => (
                                        <button 
                                            key={type}
                                            onClick={() => defenders.includes(type) ? setDefenders(defenders.filter(t => t!==type)) : defenders.length<2 && setDefenders([...defenders, type])}
                                            className={`type-btn py-3 rounded-2xl font-black text-[13px] shadow-sm border ${
                                                defenders.includes(type) 
                                                ? `${TYPE_COLORS[type]} text-white border-transparent ring-4 ring-offset-2 ring-indigo-50 shadow-lg` 
                                                : 'bg-white text-slate-500 hover:text-slate-800 border-slate-100'
                                            }`}
                                        >
                                            {type}
                                        </button>
                                    ))}
                                </div>

                                <div className="p-6 bg-slate-50 rounded-[2.5rem] border border-slate-100">
                                    <h3 className="text-xs font-black text-slate-400 uppercase tracking-widest flex items-center gap-2 mb-4">
                                        <i data-lucide="search" size="14"></i> 可能遇到的对手
                                    </h3>
                                    <div className="flex flex-wrap gap-2">
                                        {defenders.length === 0 ? (
                                            <p className="text-slate-400 text-sm italic py-4">请选择属性...</p>
                                        ) : getDefenderSpriteReference.length > 0 ? (
                                            getDefenderSpriteReference.map(name => (
                                                <span key={name} className="px-4 py-2 bg-white text-slate-800 text-xs font-black rounded-xl custom-shadow border border-slate-50 hover:bg-indigo-600 hover:text-white transition-colors">
                                                    {name}
                                                </span>
                                            ))
                                        ) : (
                                            <p className="text-rose-500 text-sm font-bold py-4">图鉴未收录该组合</p>
                                        )}
                                    </div>
                                </div>
                            </section>
                        </div>

                        {/* 右侧分析栏 */}
                        <div className="lg:col-span-7">
                            <div className="bg-white rounded-[3rem] custom-shadow overflow-hidden flex flex-col min-h-[700px]">
                                <div className="bg-slate-900 text-white p-8 flex items-center gap-4">
                                    <div className="w-12 h-12 rounded-2xl bg-rose-500/20 flex items-center justify-center text-rose-500">
                                        <i data-lucide="swords" size="28"></i>
                                    </div>
                                    <div>
                                        <h3 className="font-black text-xl tracking-tight">打击方案深度分析</h3>
                                        <p className="text-slate-400 text-xs mt-0.5 uppercase tracking-widest font-bold">Strategy Report</p>
                                    </div>
                                </div>

                                <div className="p-8 grow bg-slate-50/30">
                                    {!results ? (
                                        <div className="h-full flex flex-col items-center justify-center space-y-6 py-40">
                                            <div className="w-24 h-24 rounded-[2.5rem] bg-white flex items-center justify-center text-slate-200 custom-shadow border border-slate-100 animate-bounce">
                                                <i data-lucide="target" size="48"></i>
                                            </div>
                                            <p className="text-slate-400 font-black">等待选择属性以生成报告</p>
                                        </div>
                                    ) : (
                                        <div className="space-y-10">
                                            {['3', '2'].map(val => results[val].length > 0 && (
                                                <div key={val} className={`p-8 rounded-[3rem] border-2 ${val === '3' ? 'bg-rose-50/50 border-rose-100' : 'bg-orange-50/50 border-orange-100'} shadow-xl`}>
                                                    <div className="flex items-center justify-between mb-8">
                                                        <h3 className={`font-black text-xl flex items-center gap-3 ${val === '3' ? 'text-rose-600' : 'text-orange-600'}`}>
                                                            <i data-lucide="zap" fill="currentColor"></i> {val === '3' ? '极致打击' : '属性克制'} ({val}x)
                                                        </h3>
                                                        <span className={`text-[11px] font-black uppercase px-4 py-1.5 rounded-full ${val === '3' ? 'bg-rose-600 text-white' : 'bg-orange-600 text-white'}`}>最高优先级</span>
                                                    </div>
                                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-5">
                                                        {results[val].map(t => (
                                                            <div key={t} className="bg-white p-6 rounded-[2.5rem] custom-shadow border border-slate-50 transition-all hover:scale-[1.02]">
                                                                <div className="flex items-center justify-between mb-4">
                                                                    <span className={`px-5 py-2 rounded-2xl text-white font-black text-base shadow-lg ${TYPE_COLORS[t]}`}>{t}</span>
                                                                    <i data-lucide="sparkles" className="text-yellow-400" size={18}></i>
                                                                </div>
                                                                <div className="flex flex-wrap gap-2">
                                                                    {getRecommendedPets(t).map(p => (
                                                                        <span key={p} className="px-3 py-1.5 bg-slate-50 text-slate-700 text-[11px] font-black rounded-xl border border-slate-100">{p}</span>
                                                                    ))}
                                                                </div>
                                                            </div>
                                                        ))}
                                                    </div>
                                                </div>
                                            ))}

                                            <div className="grid grid-cols-1 md:grid-cols-2 gap-8 pt-8 border-t border-slate-200">
                                                <div>
                                                    <h4 className="text-[12px] font-black text-slate-400 uppercase tracking-widest flex items-center gap-3 mb-6"><i data-lucide="activity" size="16"></i> 正常倍率</h4>
                                                    <div className="flex flex-wrap gap-2">
                                                        {results['1'].map(t => <span key={t} className="px-4 py-2.5 bg-white text-slate-700 text-[12px] font-black rounded-[1.2rem] custom-shadow border border-slate-100">{t}</span>)}
                                                    </div>
                                                </div>
                                                <div>
                                                    <h4 className="text-[12px] font-black text-slate-400 uppercase tracking-widest flex items-center gap-3 mb-6"><i data-lucide="shield-alert" size="16"></i> 弱效抵抗</h4>
                                                    <div className="flex flex-wrap gap-2">
                                                        {results['0.5'].concat(results['0.25']).map(t => <span key={t} className="px-4 py-2.5 bg-slate-100 text-slate-400 text-[12px] font-black rounded-[1.2rem] border border-slate-200/50">{t}</span>)}
                                                    </div>
                                                </div>
                                            </div>
                                        </div>
                                    )}
                                </div>

                                <footer className="bg-white p-8 border-t border-slate-100 flex items-center justify-between text-slate-400">
                                    <div className="flex items-center gap-6">
                                        <div className="flex flex-col"><span className="text-[10px] font-black uppercase">Version</span><span className="text-xs font-black text-slate-900">5.5.0 CLOUD</span></div>
                                        <div className="w-px h-8 bg-slate-200"></div>
                                        <div className="flex flex-col"><span className="text-[10px] font-black uppercase">Data Engine</span><span className="text-xs font-black text-indigo-600">GITHUB REMOTE</span></div>
                                    </div>
                                    <div className="hidden md:flex items-center gap-2"><i data-lucide="info" size="14"></i><span className="text-[10px] font-black uppercase">Dual-Type Limit: 3.0x</span></div>
                                </footer>
                            </div>
                        </div>
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
