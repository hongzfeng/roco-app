        const TYPE_COLORS = {
            '普通': 'bg-stone-300', '火': 'bg-rose-400', '水': 'bg-sky-400', '草': 'bg-emerald-400',
            '电': 'bg-amber-300', '冰': 'bg-blue-200', '武': 'bg-orange-500', '毒': 'bg-fuchsia-400',
            '地': 'bg-yellow-600', '翼': 'bg-indigo-300', '虫': 'bg-lime-400', '石': 'bg-gray-500',
            '幽': 'bg-violet-500', '龙': 'bg-purple-600', '恶': 'bg-slate-700', '机械': 'bg-zinc-400',
            '萌': 'bg-pink-400', '光': 'bg-yellow-100 text-yellow-800', '幻': 'bg-pink-500'
        };

        const LOVE_QUOTES = [
            "廖洁，今天的你比光系精灵还要闪耀 ✨",
            "遇见你是我在洛克王国抓到的最稀有的‘精灵’ ❤️",
            "不管属性如何克制，我对你的爱永远是3倍伤害！",
            "廖洁，你是我的专属守护神 👼",
            "和你在一起的每一秒，都是我的极致克制时刻。",
            "廖洁，你是我的全系守护，无人能及 🌸"
        ];

        // 图标组件：解决 React 渲染冲突
        const LucideIcon = ({ name, size = 20, className = "", fill = "none" }) => {
            const containerRef = useRef(null);
            useEffect(() => {
                if (window.lucide && containerRef.current) {
                    containerRef.current.innerHTML = `<i data-lucide="${name}" class="${className}" style="width: ${size}px; height: ${size}px; fill: ${fill}"></i>`;
                    window.lucide.createIcons({ root: containerRef.current });
                }
            }, [name, size, className, fill]);
            return <span ref={containerRef} className="inline-flex items-center justify-center"></span>;
        };

        function App() {
            const [defenders, setDefenders] = useState([]);
            const [quote, setQuote] = useState(LOVE_QUOTES[0]);
            const [showBurst, setShowBurst] = useState(false);

            // 预处理图鉴（离线即时完成）
            const processedPets = useMemo(() => {
                const WIKI_MAP = { '幽灵': '幽', '恶魔': '恶', '土': '地' };
                return PET_DATA.map(p => {
                    const clean = new Set();
                    p.types.forEach(tg => {
                        const items = typeof tg === 'string' ? tg.split(',') : tg;
                        items.forEach(t => {
                            let s = t.trim(); s = WIKI_MAP[s] || s;
                            if (TYPE_RULES_DATA[s]) clean.add(s);
                        });
                    });
                    return { name: p.name, types: Array.from(clean) };
                });
            }, []);

            const results = useMemo(() => {
                if (defenders.length === 0) return null;
                const res = { '3': [], '2': [], '1': [], '0.5': [], '0.25': [], '0': [] };
                Object.keys(TYPE_RULES_DATA).forEach(attacker => {
                    let m = 1;
                    defenders.forEach(def => {
                        if (TYPE_RULES_DATA[attacker].strong.includes(def)) m *= 2;
                        if (TYPE_RULES_DATA[attacker].resist.includes(def)) m *= 0.5;
                    });
                    if (m >= 4) m = 3;
                    const key = m.toString();
                    if (res[key]) res[key].push(attacker);
                    else if (m < 0.25 && m > 0) res['0.25'].push(attacker);
                    else if (m === 0) res['0'].push(attacker);
                });
                return res;
            }, [defenders]);

            const getRecommendedPets = (type) => {
                const matches = []; const seen = new Set();
                for (let i = processedPets.length - 1; i >= 0; i--) {
                    const p = processedPets[i];
                    if (p.types.includes(type) && !seen.has(p.name)) {
                        matches.push(p.name); seen.add(p.name);
                    }
                    if (matches.length >= 6) break;
                }
                return matches;
            };

            const getDefenderSpriteReference = useMemo(() => {
                if (defenders.length === 0) return [];
                const matches = []; const seen = new Set();
                for (let i = processedPets.length - 1; i >= 0; i--) {
                    const p = processedPets[i];
                    if (defenders.every(t => p.types.includes(t)) && !seen.has(p.name)) {
                        matches.push(p.name); seen.add(p.name);
                    }
                    if (matches.length >= 15) break;
                }
                return matches;
            }, [defenders, processedPets]);

            const triggerLove = () => {
                setQuote(LOVE_QUOTES[Math.floor(Math.random() * LOVE_QUOTES.length)]);
                setShowBurst(true);
                setTimeout(() => setShowBurst(false), 1000);
            };

            return (
                <div className="max-w-6xl mx-auto p-4 md:p-8 relative min-h-screen">
                    {/* 背景灵动装饰 */}
                    <div className="fixed top-0 left-0 w-full h-full -z-10 opacity-30 pointer-events-none overflow-hidden">
                         <div className="absolute top-[10%] left-[5%] w-64 h-64 bg-pink-200 rounded-full blur-[100px] animate-pulse"></div>
                         <div className="absolute bottom-[10%] right-[5%] w-96 h-96 bg-purple-200 rounded-full blur-[120px] animate-pulse"></div>
                    </div>

                    <header className="flex flex-col md:flex-row items-center justify-between mb-12 gap-6 relative z-10">
                        <div className="flex items-center gap-5">
                            <div className="bg-pink-500 p-4 rounded-[2.5rem] shadow-lg shadow-pink-200 floating text-white">
                                <LucideIcon name="heart" size={36} fill="white" />
                            </div>
                            <div>
                                <h1 className="text-4xl font-black tracking-tight">廖洁专属 <span className="text-pink-500">·</span> 爱意助手</h1>
                                <p className="text-pink-400 font-bold text-xs mt-1 uppercase tracking-[0.2em] flex items-center gap-2">
                                    <LucideIcon name="award" size={14} fill="#ec4899" /> 全能离线典藏版 · 廖洁专属
                                </p>
                            </div>
                        </div>
                        <button onClick={triggerLove} className="bg-white px-6 py-4 rounded-3xl shadow-sm border border-pink-100 flex items-center gap-4 group transition-all hover:shadow-pink-200 hover:scale-105 active:scale-95">
                            <div className="text-right">
                                <p className="text-[10px] font-black text-slate-300 uppercase">惊喜驿站</p>
                                <p className="text-xs font-bold text-pink-500">廖洁的随机情话</p>
                            </div>
                            <div className="w-12 h-12 rounded-full bg-pink-50 flex items-center justify-center text-pink-500 group-hover:bg-pink-500 group-hover:text-white transition-colors shadow-inner">
                                <LucideIcon name="heart" size={24} fill={showBurst ? "currentColor" : "none"} className={showBurst ? "love-burst" : ""} />
                            </div>
                        </button>
                    </header>

                    <div className="mb-10 text-center animate-in fade-in duration-1000">
                        <p className="inline-block px-10 py-4 bg-white/80 backdrop-blur-md border border-pink-200 rounded-full text-pink-600 font-bold text-sm italic shadow-xl">
                            " {quote} "
                        </p>
                    </div>

                    <main className="grid grid-cols-1 lg:grid-cols-12 gap-8 relative z-10">
                        {/* 控制面板 */}
                        <div className="lg:col-span-5 space-y-6">
                            <section className="glass-card p-8 rounded-[3.5rem] shadow-2xl">
                                <h2 className="text-xl font-black text-slate-800 mb-8 flex items-center gap-3">
                                    <LucideIcon name="shield" className="text-pink-500" /> 防守属性设定
                                </h2>
                                <div className="grid grid-cols-4 sm:grid-cols-5 gap-3">
                                    {Object.keys(TYPE_RULES_DATA).map(type => (
                                        <button 
                                            key={type}
                                            onClick={() => defenders.includes(type) ? setDefenders(defenders.filter(t => t!==type)) : defenders.length<2 && setDefenders([...defenders, type])}
                                            className={`py-3.5 rounded-2xl font-black text-xs transition-all border ${
                                                defenders.includes(type) 
                                                ? `${TYPE_COLORS[type]} text-white border-transparent ring-4 ring-pink-100 shadow-xl scale-95` 
                                                : 'bg-white/60 text-slate-500 border-slate-100 hover:border-pink-300 hover:text-pink-500'
                                            }`}
                                        >
                                            {type}
                                        </button>
                                    ))}
                                </div>
                                <div className="mt-10 p-8 bg-pink-50/50 rounded-[2.5rem] border-2 border-dashed border-pink-100">
                                    <h3 className="text-xs font-black text-pink-400 mb-6 uppercase tracking-widest flex items-center gap-2">
                                        <LucideIcon name="search" size={16} /> 可能遇到的精灵参考
                                    </h3>
                                    <div className="flex flex-wrap gap-2.5">
                                        {defenders.length === 0 ? (
                                            <p className="text-slate-400 text-xs italic py-2">请先点击上方属性按钮...</p>
                                        ) : getDefenderSpriteReference.length > 0 ? (
                                            getDefenderSpriteReference.map(name => (
                                                <span key={name} className="px-4 py-2 bg-white text-slate-700 text-xs font-bold rounded-xl border border-pink-50 shadow-sm hover:bg-pink-500 hover:text-white transition-colors cursor-default">
                                                    {name}
                                                </span>
                                            ))
                                        ) : (
                                            <p className="text-rose-400 text-xs font-bold py-2">图鉴暂未录入该组合</p>
                                        )}
                                    </div>
                                </div>
                            </section>
                        </div>

                        {/* 分析面板 */}
                        <div className="lg:col-span-7">
                            <div className="bg-white/90 rounded-[3.5rem] shadow-2xl shadow-pink-100/50 overflow-hidden flex flex-col min-h-[650px] border border-pink-50">
                                <div className="bg-slate-900 p-8 flex items-center justify-between text-white">
                                    <div className="flex items-center gap-4">
                                        <div className="w-14 h-14 rounded-2xl bg-pink-500/20 flex items-center justify-center text-pink-500 shadow-lg">
                                            <LucideIcon name="zap" size={28} fill="currentColor" />
                                        </div>
                                        <div>
                                            <h3 className="font-black text-2xl tracking-tight">打击方案预测</h3>
                                            <p className="text-[10px] text-pink-400 uppercase font-black tracking-widest mt-1">Combat Analysis For Liao Jie</p>
                                        </div>
                                    </div>
                                    <button onClick={() => { setDefenders([]); triggerLove(); }} className="w-12 h-12 flex items-center justify-center hover:bg-white/10 rounded-full transition-colors">
                                        <LucideIcon name="refresh-cw" size={20} />
                                    </button>
                                </div>

                                <div className="p-10 grow bg-slate-50/20">
                                    {!results ? (
                                        <div className="h-full flex flex-col items-center justify-center space-y-8 opacity-40 py-24">
                                            <div className="w-24 h-24 rounded-[3rem] bg-white shadow-xl flex items-center justify-center text-pink-200">
                                                <LucideIcon name="heart" size={64} fill="currentColor" className="animate-pulse" />
                                            </div>
                                            <p className="font-bold text-slate-400 tracking-[0.2em]">廖洁，请选择属性组合</p>
                                        </div>
                                    ) : (
                                        <div className="space-y-10 animate-in slide-in-from-bottom-5 duration-700">
                                            {['3', '2'].map(val => results[val].length > 0 && (
                                                <div key={val} className={`p-8 rounded-[3rem] border-2 shadow-xl ${val === '3' ? 'bg-pink-50/50 border-pink-100' : 'bg-orange-50/50 border-orange-100'}`}>
                                                    <h3 className={`font-black text-xl mb-8 flex items-center gap-3 ${val === '3' ? 'text-pink-600' : 'text-orange-600'}`}>
                                                        <LucideIcon name="swords" size={22} /> 
                                                        {val === '3' ? '对廖洁的极致宠爱 (3x)' : '克制优势 (2x)'}
                                                    </h3>
                                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-5">
                                                        {results[val].map(t => (
                                                            <div key={t} className="bg-white p-6 rounded-[2.5rem] shadow-sm border border-slate-50 group hover:shadow-xl transition-all hover:scale-[1.02]">
                                                                <div className="flex items-center justify-between mb-4">
                                                                    <span className={`px-5 py-2.5 rounded-2xl text-white font-black text-sm shadow-md ${TYPE_COLORS[t]}`}>{t}</span>
                                                                    <LucideIcon name="star" className="text-yellow-400" size={16} fill="currentColor" />
                                                                </div>
                                                                <div className="flex flex-wrap gap-2">
                                                                    {getRecommendedPets(t).map(name => (
                                                                        <span key={name} className="px-3 py-1.5 bg-pink-50/30 text-slate-600 text-[11px] font-bold rounded-xl border border-pink-100">{name}</span>
                                                                    ))}
                                                                </div>
                                                            </div>
                                                        ))}
                                                    </div>
                                                </div>
                                            ))}
                                            
                                            <div className="grid grid-cols-1 sm:grid-cols-2 gap-6 pt-6 border-t border-pink-50">
                                                <div className="p-6 bg-white/60 rounded-[2.5rem] border border-slate-100">
                                                    <h4 className="text-[11px] font-black text-slate-400 uppercase tracking-widest mb-4 flex items-center gap-2">
                                                        <LucideIcon name="activity" size={14} /> 正常打击
                                                    </h4>
                                                    <div className="flex flex-wrap gap-2">
                                                        {results['1'].map(t => <span key={t} className="px-3.5 py-1.5 bg-white text-slate-600 text-[11px] font-bold rounded-xl border border-slate-100 shadow-sm">{t}</span>)}
                                                    </div>
                                                </div>
                                                <div className="p-6 bg-slate-100/50 rounded-[2.5rem] border border-slate-200/50">
                                                    <h4 className="text-[11px] font-black text-slate-400 uppercase tracking-widest mb-4 flex items-center gap-2">
                                                        <LucideIcon name="shield-alert" size={14} /> 弱效打击
                                                    </h4>
                                                    <div className="flex flex-wrap gap-2">
                                                        {results['0.5'].concat(results['0.25']).concat(results['0']).map(t => <span key={t} className="px-3.5 py-1.5 bg-slate-200 text-slate-400 text-[11px] font-bold rounded-xl">{t}</span>)}
                                                    </div>
                                                </div>
                                            </div>

                                            {/* 浪漫彩蛋逻辑 */}
                                            {defenders.some(d => d === '光' || d === '幻') && (
                                                <div className="p-6 bg-gradient-to-r from-pink-500 to-rose-400 rounded-3xl text-white text-center shadow-xl animate-bounce border-2 border-white/50">
                                                    <p className="font-black text-base tracking-widest">✨ 廖洁发现彩蛋了！你是光，也是我最美的幻想 ✨</p>
                                                </div>
                                            )}
                                        </div>
                                    )}
                                </div>

                                <footer className="p-8 border-t border-pink-50 text-center bg-white/50 text-[10px] font-black text-pink-300 uppercase tracking-[0.4em]">
                                    Special Offline Edition · Dedicated To Liao Jie
                                </footer>
                            </div>
                        </div>
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
